# wrangler.toml — Configuración para Cloudflare Pages
# Deploy: npx wrangler pages deploy dist --project-name=carlosposada-dev
# Dev local: npx wrangler pages dev dist
# https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "carlosposada-dev"
compatibility_date = "2025-01-01"

# nodejs_compat: habilita APIs de Node.js en el runtime de Cloudflare Workers/Pages
# Requerido para Node.js 22 y módulos modernos (crypto, stream, etc.)
compatibility_flags = ["nodejs_compat"]

# Directorio de output del build de Astro → usado por `wrangler pages deploy`
pages_build_output_dir = "dist"

# Variables de entorno para desarrollo local únicamente.
# Para producción configurar en:
# Cloudflare Dashboard → Workers & Pages → carlosposada-dev → Settings → Variables
[vars]
CONTACT_TO_EMAIL = "hello@carlosposada.dev"
# RESEND_API_KEY debe ir como Secret — NUNCA en texto plano:
# npx wrangler pages secret put RESEND_API_KEY --project-name=carlosposada-dev
